<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="900" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#7b2ff7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" fill="url(#bg)" rx="10"/>

  <!-- Subtle top border -->
  <rect x="0" y="0" width="900" height="2" fill="url(#lineGrad)" rx="1"/>
  <!-- Subtle bottom border -->
  <rect x="0" y="178" width="900" height="2" fill="url(#lineGrad)" rx="1"/>

  <!-- HXR -->
  <text x="450" y="110" font-family="'Courier New', monospace" font-size="96" font-weight="900"
    fill="url(#textGrad)" filter="url(#glow)" text-anchor="middle" letter-spacing="20">HXR</text>

  <!-- Divider line -->
  <rect x="280" y="122" width="340" height="1" fill="url(#lineGrad)" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="450" y="148" font-family="'Courier New', monospace" font-size="13" font-weight="400"
    fill="#888" text-anchor="middle" letter-spacing="6">ADVANCED SECURITY RECONNAISSANCE TOOL</text>
</svg>
